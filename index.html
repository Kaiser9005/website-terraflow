  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Où sont hébergées mes données ?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Vos données sont stockées sur l'infrastructure Supabase (certifiée SOC 2 Type II), avec résidence au choix en Europe (Francfort) ou en Afrique. Chiffrement AES-256 au repos et TLS 1.3 en transit."
        }
      },
      {
        "@type": "Question",
        "name": "KALTIV fonctionne-t-il sans Internet ?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Oui. Le mode hors-ligne (PWA + ONNX) permet la saisie terrain, les prédictions IA locales, et la synchronisation automatique au retour de la connexion."
        }
      },
      {
        "@type": "Question",
        "name": "Combien de temps pour migrer depuis Excel ?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "En moyenne 2 semaines. Notre équipe assiste l'import de vos fichiers Excel, cahiers de terrain et données existantes. Le processus est guidé et validé à chaque étape."
        }
      },
      {
        "@type": "Question",
        "name": "Est-ce conforme OHADA pour mon pays ?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "KALTIV couvre 30 pays : les 17 pays OHADA (CEMAC/UEMOA), 8 pays anglophones et 5 pays lusophones. Plan comptable SYSCOHADA, cotisations sociales adaptées par pays et multi-devises."
        }
      },
      {
        "@type": "Question",
        "name": "Comment est calculé le prix ?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Le tarif dépend du nombre d'utilisateurs et de modules activés. Le plan Foundation commence à $115/mois (75 000 FCFA). Essai gratuit de 30 jours, sans engagement."
        }
      },
      {
        "@type": "Question",
        "name": "Y a-t-il une application mobile ?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "KALTIV est une PWA (Progressive Web App) installable sur tout smartphone Android ou iOS. Pas besoin de télécharger depuis un store — accédez directement depuis votre navigateur."
        }
      }
    ]
  }
